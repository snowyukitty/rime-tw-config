# luna_pinyin_tw 在地化補正
# 原 luna_pinyin 基礎詞庫使用舊字形「爲」，而 t2tw.json 只套 TWVariants，
# 不會把「爲」正規化為臺灣正體「為」。這裡在既有 t2tw simplifier 之後，
# 再掛一道自訂 OpenCC simplifier(tw_fix)，把輸出中的「爲」一律轉成「為」。
# 涵蓋基礎詞庫、自學詞庫、以及未來造詞的所有候選。
# 字典：opencc/tw_fix.txt   設定：opencc/tw_fix.json
patch:
  engine/filters:
    - simplifier
    - simplifier@tw_fix
    - simplifier@zh_simp
    - uniquifier
  tw_fix:
    opencc_config: tw_fix.json
    option_name: zh_tw
  zh_simp:
    opencc_config: t2s.json
    option_name: zh_simp
  # zh_tw 固定預設開啟，負責臺灣字形；不要再拿它做熱鍵切換，
  # 否則回到輸入法時可能落在非臺灣字形狀態。
  # index 3 對應 switches 第 4 項 zh_tw（ascii_mode/full_shape/ascii_punct/zh_tw）。
  "switches/@3":
    name: zh_tw
    reset: 1
  # Ctrl+Shift+4 切換這個最後輸出層：OFF=繁體，ON=简体。
  "switches/+":
    - name: zh_simp
      reset: 0
      states: [ 繁體, 简体 ]
