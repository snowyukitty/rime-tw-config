customization:
  distribution_code_name: Weasel
  distribution_version: 0.15.0.0
  generator: "Rime::SwitcherSettings"
  modified_time: "Wed Oct  4 15:04:58 2023"
  rime_version: 1.8.5

patch:

  schema_list:
    - schema: luna_pinyin_tw
    - schema: luna_pinyin_simp

  key_binder:
    bindings:
      __patch:
        - key_bindings:/emacs_editing
        - key_bindings:/move_by_word_with_tab
        - key_bindings:/paging_with_minus_equal
        - key_bindings:/paging_with_comma_period

  # Ctrl+Shift+4 切換繁/簡。luna_pinyin_tw 的繁簡開關叫 zh_tw（非 stock 的
  # simplification），故這裡直接 toggle zh_tw：ON=繁體(t2tw)、OFF=简体(luna 基礎詞庫)。
  "key_binder/bindings/+":
    - { when: always, accept: "Control+Shift+4", toggle: zh_tw }
