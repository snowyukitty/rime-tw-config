customization:
  distribution_code_name: Weasel
  distribution_version: 0.15.0.0
  generator: "Rime::SwitcherSettings"
  modified_time: "Wed Oct  4 15:04:58 2023"
  rime_version: 1.8.5

patch:

  schema_list:
    - schema: luna_pinyin_tw

  key_binder:
    bindings:
      __patch:
        - key_bindings:/emacs_editing
        - key_bindings:/move_by_word_with_tab
        - key_bindings:/paging_with_minus_equal
        - key_bindings:/paging_with_comma_period

  # Ctrl+Shift+4 切換繁/簡。預設 schema 固定使用 luna_pinyin_tw；
  # 熱鍵只切最後一層 zh_simp，避免 Rime 把 luna_pinyin_simp 記成預設 schema。
  "key_binder/bindings/+":
    - { when: always, accept: "Control+Shift+4", toggle: zh_simp }
    - { when: always, accept: "Control+Shift+dollar", toggle: zh_simp }
